<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 282" width="420" height="282" role="img" aria-label="Top languages">
<defs><style><![CDATA[
text{font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shineX{0%{transform:translateX(-140px)}60%,100%{transform:translateX(460px)}}
.row{opacity:0;animation:fadeUp .5s ease forwards}
.sh{animation:shineX 4.5s ease-in-out 2.2s infinite}
]]></style>
<linearGradient id="tg" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%"><animate attributeName="stop-color" values="#ff7eb6;#c084fc;#ff7eb6" dur="6s" repeatCount="indefinite"/></stop>
  <stop offset="100%"><animate attributeName="stop-color" values="#c084fc;#ff7eb6;#c084fc" dur="6s" repeatCount="indefinite"/></stop>
</linearGradient>
<linearGradient id="shg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#fff" stop-opacity="0"/><stop offset="50%" stop-color="#fff" stop-opacity=".08"/><stop offset="100%" stop-color="#fff" stop-opacity="0"/></linearGradient>
<clipPath id="cardc"><rect x="1" y="1" width="418" height="280" rx="14"/></clipPath>
<clipPath id="stackc"><rect x="20" y="58" width="0" height="11" rx="5.5"><animate attributeName="width" from="0" to="380" dur="1.4s" begin=".4s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/></rect></clipPath>
</defs>
<rect x="1" y="1" width="418" height="280" rx="14" fill="#170e28" stroke="url(#tg)" stroke-width="1.5"/>
<text x="20" y="34" font-size="16" font-weight="bold" fill="url(#tg)">📊 Top Languages</text>
<g clip-path="url(#stackc)"><rect x="20.0" y="58" width="197.6" height="11" fill="#3572A5"/><rect x="217.6" y="58" width="106.4" height="11" fill="#e38c00"/><rect x="324.0" y="58" width="57.0" height="11" fill="#f1e05a"/><rect x="381.0" y="58" width="19.0" height="11" fill="#F2C811"/></g>

  <g class="row" style="animation-delay:0.90s">
    <circle cx="26" cy="91" r="5" fill="#3572A5"/>
    <text x="40" y="96" font-size="13" fill="#e6edf3" font-weight="bold">Python</text>
    <text x="396" y="96" text-anchor="end" font-size="13" fill="#3572A5" font-weight="bold">92.0%</text>
    <rect x="40" y="104" width="268" height="9" rx="4.5" fill="#241740"/>
    <rect class="bar" x="40" y="104" width="246.6" height="9" rx="4.5" fill="#3572A5" style="animation-delay:1.05s">
      <animate attributeName="width" from="0" to="246.6" dur="1.1s" begin="1.05s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
    </rect>
  </g>
  <g class="row" style="animation-delay:1.25s">
    <circle cx="26" cy="133" r="5" fill="#e38c00"/>
    <text x="40" y="138" font-size="13" fill="#e6edf3" font-weight="bold">SQL</text>
    <text x="396" y="138" text-anchor="end" font-size="13" fill="#e38c00" font-weight="bold">88.0%</text>
    <rect x="40" y="146" width="268" height="9" rx="4.5" fill="#241740"/>
    <rect class="bar" x="40" y="146" width="235.8" height="9" rx="4.5" fill="#e38c00" style="animation-delay:1.40s">
      <animate attributeName="width" from="0" to="235.8" dur="1.1s" begin="1.40s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
    </rect>
  </g>
  <g class="row" style="animation-delay:1.60s">
    <circle cx="26" cy="175" r="5" fill="#f1e05a"/>
    <text x="40" y="180" font-size="13" fill="#e6edf3" font-weight="bold">JavaScript</text>
    <text x="396" y="180" text-anchor="end" font-size="13" fill="#f1e05a" font-weight="bold">76.0%</text>
    <rect x="40" y="188" width="268" height="9" rx="4.5" fill="#241740"/>
    <rect class="bar" x="40" y="188" width="203.7" height="9" rx="4.5" fill="#f1e05a" style="animation-delay:1.75s">
      <animate attributeName="width" from="0" to="203.7" dur="1.1s" begin="1.75s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
    </rect>
  </g>
  <g class="row" style="animation-delay:1.95s">
    <circle cx="26" cy="217" r="5" fill="#F2C811"/>
    <text x="40" y="222" font-size="13" fill="#e6edf3" font-weight="bold">Power BI</text>
    <text x="396" y="222" text-anchor="end" font-size="13" fill="#F2C811" font-weight="bold">60.0%</text>
    <rect x="40" y="230" width="268" height="9" rx="4.5" fill="#241740"/>
    <rect class="bar" x="40" y="230" width="160.8" height="9" rx="4.5" fill="#F2C811" style="animation-delay:2.10s">
      <animate attributeName="width" from="0" to="160.8" dur="1.1s" begin="2.10s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
    </rect>
  </g>
<g clip-path="url(#cardc)"><rect class="sh" x="0" y="0" width="100" height="282" fill="url(#shg)" transform="skewX(-15)"/></g>
</svg>